<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="shortcut icon" href="assets/img/favicon.ico">
		<title>Home Page</title>
		<script type="module" crossorigin="" src="./js/index.min.js?v=1773996137715"></script>
		<link rel="modulepreload" crossorigin="" href="./js/common.min.js?v=1773996137715">
		<link rel="stylesheet" crossorigin="" href="./css/index.min.css?v=1773996137715">
	</head>
	<body>
		<div class="wrapper">
			<header data-fls-header="" class="header">
				<video autoplay muted loop playsinline="" class="header__video">
					<source src="./files/main.mp4" type="video/mp4">
				</video>
				<div class="header__container">
					<div class="header__layout">
						<div class="header__visual">
							<img src="./assets/img/logo.svg" alt="Logo" class="header__logo">
							<img src="./assets/img/logo_smart.svg" alt="Logo" class="header__logo-smart">
						</div>
						<h1 class="header__title">Пакет розширених можливостей до твого тарифу інтернет</h1>
						<a href="#" data-fls-button="" class="header__button">Додати пакет</a>
					</div>
				</div>
			</header>
			<main class="page">
				<div data-fls-index="" class="index">
					<section class="page__about about">
						<div class="about__container">
							<div class="about__block">
								<div class="about__block-header">
									<div class="about-block_label">Що входить у пакет?</div>
									<h2 class="about-block_title">1. Сервіс, що підлаштовується під вас</h2>
								</div>
								<div class="about__block-items">
									<article class="about-block_item item-about">
										<div class="item-about__image">
											<picture>
												<source media="(max-width: 600px)" srcset="./assets/img/about_01_01-600.webp" type="image/webp">
												<img alt="Image" src="./assets/img/about_01_01.webp">
											</picture>
										</div>
										<h3 class="item-about__title">item-about__</h3>
										<p class="item-about__text">Виділений канал зв’язку з техпідтримкою</p>
									</article>
								</div>
							</div>
						</div>
					</section>
				</div>
			</main>
			<footer data-fls-footer="" class="footer">
				<div class="footer__container"></div>
			</footer>
		</div>
	</body>
</html>
